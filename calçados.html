    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: AdihausDIN, Helvetica, Arial, Helvetica, sans-serif;
        }

         .nav-bar{
            width: 100%;
            z-index: 1;
            position: fixed;
            background-color: black;
            display: flex;
            flex-direction: row;
            padding: 5px 100px;
            top: 0;

        }
        .nav-bar p{
            margin-right: 10px;
        }
        .logo{
            color: black;
            margin-left: 5% !important;
            background-color: white;
            padding: 10px 30px;
            border-radius: 50px;
            transition: all 0.3s ease;
            
        }
        a {
            text-decoration: none;
            }

        .logo:hover{
            color: white;
            background-color: black;
            transform: scale(1.1);
            box-shadow: 0px 0px 3px 2px;
        }

        .setores{
            margin-left: 25%;
            font-weight: bold;
            display: flex;
            flex-direction: row;}
        .setores p{
            color: white;
            margin-top: 20px;
            margin-right: 50px;
            transition: all 0.3s ease;
            
        }
 
        .setores p:hover{
            color: black    ;
            display: inline-block;
            border-bottom: 2px solid #e9891e;
            transform: scale(1.1);
            box-shadow: 0px 0px 3px 2px #e9891e;
            background-color: rgb(255, 255, 255);
            border-radius: 10px;
            padding: 5px 13px; /* afasta a linha do texto */
            margin-bottom: 20px; /* espaço externo, se quiser */
        }
        
        .barra-de-busca{
            margin: 20px 10px 5px 15%;
            position: relative;
            transition: all 0.3s ease;
        }
        .barra-de-busca:hover{
            transform: scale(1.1);
        }

        .barra-de-busca input{
            padding: 10px 10px 10px 40px;
            border-radius: 40px;
            transition: all 0.1s ease;
        } 
        .barra-de-busca input:hover{
            box-shadow: 0px 0px 5px 1px white;
            background-color: white;
            border-color: black;
        }  

        .barra-de-busca img{
            position: absolute;
            margin: 10px 0px 0px 10px;
        }
        h2{
            transform: translate( 150px, 200px);
            font-family:'Times New Roman', Times, serif;
        }

        .imagens-tenis{
            display: grid;
            max-width: 100%;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            
            justify-content: center;
            align-items: center;
            transform: translate( 200px, 200px);
        }

        .bloco-img{
            position: relative;
        }
        .img-1{
            
            position: absolute;
            opacity: 1;
            transition: 0.3s ease-in-out;
        }

        .img-1:hover{
        
            opacity: 0;;
        }
        .img-2{

            opacity: 0;
            transition: 0.3s ease-in-out;
        }

        .img-2:hover{
        
            opacity: 1;;
        }

        .bloco-img{

            margin: 20px 190px 20px 0px;
        }

        .bloco-img h6{
            font-size: 19px;
            margin-bottom: 10px;
            
        }
        .bloco-img a{
            color: gray;            
        }
        .bloco-img p{
            margin-right: 10px;          
            margin-top: 20px;
        }
        .preço-tenis{
            display: flex;
            flex-direction: row;
            
        }
        .preço-tenis p:nth-child(2){
             color: gray;
             text-decoration: line-through;
        }
        .preço-tenis p:nth-child(3){
            color: green;
        }
